<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPDC - Chase Your Dream</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <img src="assets/website-logo.png" alt="IPDC Logo">
        </div>

        <ul class="nav-menu">
            <li><a href="#">Retail</a></li>
            <li><a href="#">SME</a></li>
            <li><a href="#">Corporate</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Covid 19</a></li>
            <li><a href="#">Campaigns</a></li>
        </ul>

        <div class="search-section">
            <button class="search-icon">
                <img src="assets/search-icon.png" alt="Search" width="18">
            </button>
            <button class="search-btn">iService</button>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <main class="hero">
        <div class="hero-left">
            <h1>Chase Your <br>Dream with us</h1>
            <p>
                The harder you work for something,<br>
                the greater you'll feel when you achieve it.
            </p>

            <div class="hero-buttons">
                <button class="btn btn-primary">Apply Online</button>
                <button class="btn btn-secondary">Loan Calculator</button>
            </div>

            <!-- SOCIAL BAR -->
            <div class="social-bar">
                <span class="phone">📞 +91 600 XXX X300</span>
                <div class="social-icons">
                    <a href="#"><img src="assets/facebook.png" alt="Facebook"></a>
                    <a href="#"><img src="assets/youtube.png" alt="YouTube"></a>
                    <a href="#"><img src="assets/linkedin.png" alt="LinkedIn"></a>
                    <a href="#"><img src="assets/instagram.png" alt="Instagram"></a>
                </div>
            </div>
        </div>

        <div class="hero-right">
            <img src="assets/hero-image.png" alt="Happy Family">
            <div class="floating car-loan">
                <img src="assets/car.png" alt="Car Loan Icon">
                <span>Car Loan</span>
            </div>

            <div class="floating home-loan">
                <img src="assets/House.png" alt="Home Loan Icon">
                <span>Home Loan</span>
            </div>
        </div>
    </main>

</body>

</html>
